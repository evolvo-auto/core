services:
  postgres:
    image: postgres:17-alpine
    container_name: evolvo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-evolvo}
      POSTGRES_USER: ${POSTGRES_USER:-evolvo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evolvo}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    volumes:
      - evolvo-postgres-data:/var/lib/postgresql/data
    networks:
      - evolvo-local

  adminer:
    image: adminer:5
    container_name: evolvo-adminer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${ADMINER_PORT:-8080}:8080'
    networks:
      - evolvo-local

networks:
  evolvo-local:
    name: evolvo-local

volumes:
  evolvo-postgres-data:
    name: evolvo-postgres-data
